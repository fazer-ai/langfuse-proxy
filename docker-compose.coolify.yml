services:
  langfuse-proxy:
    image: 'ghcr.io/fazer-ai/langfuse-proxy:latest'
    pull_policy: always
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-https://api.openai.com}
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY}
      - PROXY_API_KEY=${PROXY_API_KEY}
      - PROXY_TIMEOUT_MS=${PROXY_TIMEOUT_MS:-300000}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - TELEMETRY_MAX_BODY_BYTES=${TELEMETRY_MAX_BODY_BYTES:-1048576}
    command: ['./server']
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health']
      interval: 20s
      timeout: 10s
      retries: 5
